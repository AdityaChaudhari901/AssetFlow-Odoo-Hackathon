<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <script>
      (() => {
        const storageKey = "assetflow-theme";
        let storedTheme = null;

        try {
          storedTheme = window.localStorage.getItem(storageKey);
        } catch {
          // System preference remains available when storage is blocked.
        }

        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme =
          storedTheme === "light" || storedTheme === "dark"
            ? storedTheme
            : prefersDark
              ? "dark"
              : "light";

        document.documentElement.classList.toggle("dark", theme === "dark");
        document.documentElement.style.colorScheme = theme;
        document
          .querySelector('meta[name="theme-color"]')
          ?.setAttribute("content", theme === "dark" ? "#18161d" : "#ffffff");
      })();
    </script>
    <meta
      name="description"
      content="AssetFlow enterprise asset and resource management"
    />
    <link rel="icon" href="/favicon.ico" />
    <title>AssetFlow</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
